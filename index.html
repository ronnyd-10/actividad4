<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Formulario</title>
</head>

<body>

    <main class="contenedor">
        <fieldset>
            <h1>Formulario de Registro (A) </h1>
        <section>



            <form id="formulario">
  
                <label for="nombre"> Nombre completo <span>(*)</span> </label>
                <input type="text" id="nombre" name="nombre"  placeholder="5 caracteres minimo">

                <label for="email"> E-mail <span>(*)</span> </label>
                <input type="email" id="email" name="email"  placeholder="usuario@test.com">

                <label for="edad"> Edad <span>(*)</span> </label>
                <input type="number" id="edad" name="edad"  placeholder="18 a 60">

                <label for="pais"> Seleccione su Nacionalidad <span>(*)</span> </label>
                <select id="pais" name="pais" >
                    <option value="">Nacionalidad <span>(*)</span></option>
                    <option value="Argentina"> Argentina</option>
                    <option value="Bolivia"> Bolivia</option>
                    <option value="Paraguay"> Paraguay</option>
                    <option value="Chile"> Chile</option>
                    <option value="Brasil"> Brasil</option>
                    <option value="Costa Rica"> Costa Rica</option>
                    <option value="España"> España</option>
                    <option value="Otro"> Otro</option>

                </select>
                <label class="check">
                    <input type="checkbox" id="terminos" > Acepto los términos y condiciones
              
                </label>

                <button type="submit">Enviar Formulario</button>
                <button type="reset">Cancelar Formulario</button>
                </fieldset>
            </form>



        </section>
<script src="formulario.js"></script>
    </main>

</body>

</html>
